# Exchanges to trade — scanned sequentially in order listed.
# Each entry can be just the name (uses global params below)
# or a dict with override blocks for strategy / risk / position.
exchanges:
  - hyperliquid:
      position:
        max_concurrent: 10
  - tradexyz:
      position:
        max_concurrent: 10
  - dreamcash:
      position:
        max_concurrent: 10
  - hibachi:
      position:
        max_concurrent: 10

scan:
  top_n: 5
  timeframe: "1h"
  ohlcv_limit: 100

strategy:
  type: ema_trend_filter
  ema_fast: 12
  ema_slow: 26

risk:
  risk_pct: 0.5
  atr_period: 14
  atr_sl_multiplier: 1.5
  atr_tp_multiplier: 2.0

position:
  max_concurrent: 10

logging:
  level: INFO
