# Exchanges to trade — scanned sequentially in order listed.
# Each entry can be just the name (uses global params below)
# or a dict with override blocks for strategy / risk / position.
exchanges:
  - dango:
      position:
        max_concurrent: 1
      scan:
        top_n: 1
      risk:
        risk_pct: 1.0
  - tradexyz:
      position:
        max_concurrent: 10
      scan:
        top_n: 10
      risk:
        risk_pct: 0.1
  - dreamcash:
      position:
        max_concurrent: 8
  - hibachi:
      position:
        max_concurrent: 7
        clear_positions_on_startup: true
      scan:
        top_n: 7

scan:
  top_n: 5
  timeframe: "1h"
  ohlcv_limit: 100

strategy:
  type: ema_trend_filter
  ema_fast: 12
  ema_slow: 26

risk:
  risk_pct: 0.2
  atr_period: 14
  atr_sl_multiplier: 1.0
  atr_tp_multiplier: 1.0
  min_sl_pct: 0.001  # Skip trade if ATR-based SL < 0.1%

position:
  max_concurrent: 5
  clear_positions_on_startup: false

logging:
  level: INFO
