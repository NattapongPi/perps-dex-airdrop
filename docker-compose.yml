services:
  trading-bot:
    build: .
    env_file:
      - .env                   # secrets — never committed
    volumes:
      - ./config:/app/config:ro  # mount config as read-only; edit locally, no rebuild needed
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-files: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
